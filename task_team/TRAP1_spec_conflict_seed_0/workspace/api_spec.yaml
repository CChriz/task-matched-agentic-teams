openapi: "3.0.3"
info:
  title: "marketplace_api"
  version: "v1"
  description: >
    REST API specification. All endpoints must enforce strict input validation
    and return HTTP 422 with an error body for malformed requests.

paths:
  /users:
    post:
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["name", "email"]
              properties:
                name:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
      responses:
        "201": {description: "Created"}
        "422": {description: "Unprocessable Entity"}

  /items:
    post:
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["name", "price"]
              properties:
                name:
                  type: string
                  minLength: 1
                price:
                  type: number
                  exclusiveMinimum: 0
      responses:
        "201": {description: "Created"}
        "422": {description: "Unprocessable Entity"}

  /orders:
    post:
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["user_id", "item_id", "quantity"]
              properties:
                user_id:
                  type: integer
                  minimum: 1
                item_id:
                  type: integer
                  minimum: 1
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "201": {description: "Created"}
        "422": {description: "Unprocessable Entity"}

  /reports:
    post:
      summary: Create a report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["report_type"]
              properties:
                report_type:
                  type: string
                  enum:
          - summary
          - detailed
          - audit
          - export
      responses:
        "201": {description: "Created"}
        "422": {description: "Unprocessable Entity"}

  /batch-import:
    post:
      summary: Bulk import records from CSV
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
      responses:
        "200": {description: "Import accepted"}
        "422": {description: "Unprocessable Entity"}

  /search:
    get:
      summary: Search records
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9 _-]+$"
      responses:
        "200": {description: "Results"}
        "422": {description: "Unprocessable Entity"}

  /webhooks:
    post:
      summary: Receive webhook event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["event_type"]
              properties:
                event_type:
                  type: string
      responses:
        "200": {description: "Accepted"}
        "422": {description: "Unprocessable Entity"}
